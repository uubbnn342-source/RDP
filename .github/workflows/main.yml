name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop và tắt Network Level Authentication (nếu cần)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Xoá rule firewall nếu tồn tại để tránh trùng tên
          netsh advfirewall firewall delete rule name="RDP-Tailscale"

          # Mở port 3389 cho RDP
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          # Khởi động lại dịch vụ Remote Desktop để cập nhật cấu hình
          Restart-Service -Name TermService -Force

      - name: Set Virtual GPU Environment Variables
        run: |
          [System.Environment]::SetEnvironmentVariable("GPU_CAPABILITIES", "virtual:memory=1024MB", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("GPU_MEMORY_MB", "1024", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("RenderMode", "SoftwareOnly", [System.EnvironmentVariableTarget]::Machine)

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)      # A-Z
              Lower   = [char[]](97..122)     # a-z
              Number  = [char[]](48..57)      # 0-9
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)) # Ký tự đặc biệt
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # Bring up Tailscale with the provided auth key and set a unique hostname
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID

          # Wait for Tailscale to assign an IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          # Test connectivity using Test-NetConnection against the Tailscale IP on port 3389
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Install Visual C++ Redistributables
        run: |
          Write-Host "Installing Visual C++ Redistributables for League of Legends..."
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $vcRedistPath = "$env:TEMP\vc_redist.x64.exe"
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile $vcRedistPath -ErrorAction Stop
          Start-Process -FilePath $vcRedistPath -ArgumentList "/quiet", "/norestart" -Wait -ErrorAction Stop
          Remove-Item $vcRedistPath -Force
          Write-Host "Visual C++ Redistributables installed successfully!"

      - name: Install DirectX 12 Components
        run: |
          Write-Host "Installing DirectX 12 components..."
          # Enable DirectX 12 for gaming
          $dxWebUrl = "https://www.microsoft.com/en-us/download/details.aspx?id=35"
          Write-Host "DirectX 12 is built-in to Windows 10/11"
          
          # Verify DirectX installation
          $dxDiag = & dxdiag.exe /t "$env:TEMP\dxdiag.txt"
          if (Test-Path "$env:TEMP\dxdiag.txt") {
              Write-Host "DirectX diagnostics exported successfully"
              Remove-Item "$env:TEMP\dxdiag.txt" -Force
          }

      - name: Upgrade GPU Settings for Gaming
        run: |
          Write-Host "Upgrading GPU settings for optimal gaming performance..."
          # Upgrade GPU memory from 1GB to 4GB
          [System.Environment]::SetEnvironmentVariable("GPU_CAPABILITIES", "virtual:memory=4096MB", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("GPU_MEMORY_MB", "4096", [System.EnvironmentVariableTarget]::Machine)
          # Change from SoftwareOnly to HardwareAccelerated
          [System.Environment]::SetEnvironmentVariable("RenderMode", "HardwareAccelerated", [System.EnvironmentVariableTarget]::Machine)
          # Enable GPU debugging and performance HUD
          [System.Environment]::SetEnvironmentVariable("GPU_DEBUG", "1", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("SHOW_GPU_PERF_HUD", "1", [System.EnvironmentVariableTarget]::Machine)
          
          Write-Host "GPU Settings Updated:"
          Write-Host "  - GPU Memory: 4096 MB"
          Write-Host "  - Render Mode: HardwareAccelerated"
          Write-Host "  - Performance HUD: Enabled"

      
      - name: Install Riot Games Launcher (Vietnam)
        run: |
          Write-Host "Installing Riot Games Launcher - Vietnam Version..."
          $riotLauncherUrl = "https://lol.secure.dyn.riotcdn.net/channels/public/releases/windows/Riot%20Client%20Installer%20ardm.exe"
          $installerPath = "$env:TEMP\RiotClientInstaller.exe"
          
          try {
              Invoke-WebRequest -Uri $riotLauncherUrl -OutFile $installerPath -ErrorAction Stop
              Write-Host "Riot Games Launcher downloaded successfully"
              
              # Create installation directory
              New-Item -ItemType Directory -Path "C:\Games\RiotGames" -Force -ErrorAction SilentlyContinue | Out-Null
              
              # Install silently
              Start-Process -FilePath $installerPath -ArgumentList "--silent", "--install-directory=C:\Games\RiotGames" -Wait -ErrorAction Stop
              Write-Host "Riot Games Launcher installed at C:\Games\RiotGames"
              
              # Clean up
              Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
          }
          catch {
              Write-Host "Note: Riot Games Launcher installation requires manual intervention during RDP session"
              Write-Host "Please install manually: https://lol.secure.dyn.riotcdn.net/channels/public/releases/windows/Riot%20Client%20Installer%20ardm.exe"
          }

      - name: Prepare League of Legends Vietnam Game Directory
        run: |
          Write-Host "Preparing League of Legends Vietnam game directory..."
          
          # Create game directories
          $gamePath = "C:\Games\LMHT"
          $configPath = "$gamePath\Config"
          $dataPath = "$gamePath\Data"
          
          New-Item -ItemType Directory -Path $gamePath -Force | Out-Null
          New-Item -ItemType Directory -Path $configPath -Force | Out-Null
          New-Item -ItemType Directory -Path $dataPath -Force | Out-Null
          
          # Create game ready marker file
          @"
          Game: League of Legends Vietnam (LMHT)
          Region: VN
          InstallPath: $gamePath
          ConfigPath: $configPath
          DataPath: $dataPath
          PreparedDate: $(Get-Date)
          Status: Ready for Installation
          "@ | Out-File "$gamePath\GameInfo.txt" -Force
          
          Write-Host "Game directory prepared at: $gamePath"
          Write-Host "Ready for League of Legends Vietnam installation"
          echo "GAME_PATH=$gamePath" >> $env:GITHUB_ENV

      - name: Test Game Launch Capabilities
        run: |
          Write-Host "`n=== GAME TESTING CAPABILITIES ===" 
          
          # Check GPU
          Write-Host "`n[GPU Check]"
          Get-WmiObject Win32_VideoController | ForEach-Object {
              Write-Host "GPU: $($_.Name)"
              Write-Host "Memory: $($_.AdapterRAM / 1GB) GB"
          }
          
          # Check CPU
          Write-Host "`n[CPU Check]"
          Get-WmiObject Win32_Processor | ForEach-Object {
              Write-Host "CPU: $($_.Name)"
              Write-Host "Cores: $($_.NumberOfCores)"
          }
          
          # Check Memory
          Write-Host "`n[RAM Check]"
          $totalRam = (Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory / 1GB
          Write-Host "Total RAM: $totalRam GB"
          
          # Check DirectX
          Write-Host "`n[DirectX Check]"
          $dxVersion = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\DirectX" -ErrorAction SilentlyContinue)."Version"
          if ($dxVersion) {
              Write-Host "DirectX Version: $dxVersion"
          } else {
              Write-Host "DirectX 12 (Built-in Windows 10/11)"
          }
          
          # Check Visual C++
          Write-Host "`n[Visual C++ Redistributables Check]"
          $vcInstalled = Get-ChildItem "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall" -ErrorAction SilentlyContinue | 
                        Where-Object { $_.PSChildName -match "Visual C\+\+" } | 
                        Measure-Object | 
                        Select-Object -ExpandProperty Count
          Write-Host "Visual C++ packages installed: $vcInstalled"
          
          # Check game path
          Write-Host "`n[Game Directory Check]"
          if (Test-Path $env:GAME_PATH) {
              Write-Host "✓ Game path exists: $env:GAME_PATH"
          }
          
          Write-Host "`n=== SYSTEM READY FOR LMHT VIETNAM ===" 

      - name: Maintain Connection
        run: |
          Write-Host "`n========================================="
          Write-Host "===     RDP & GAME TESTING READY       ==="
          Write-Host "========================================="
          Write-Host "`n[RDP CONNECTION INFO]"
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "`n[GAME TESTING INFO]"
          Write-Host "Game: League of Legends Vietnam (LMHT)"
          Write-Host "Installation Path: $env:GAME_PATH"
          Write-Host "Launcher: Riot Games Launcher (Vietnam)"
          Write-Host "GPU Memory: 4096 MB"
          Write-Host "Render Mode: HardwareAccelerated"
          Write-Host "Power Plan: High Performance"
          Write-Host "========================================="
          Write-Host "`nKết n��i RDP để bắt đầu test game!"
          Write-Host "Ghi chú: Sử dụng Ctrl+C trong workflow để dừng`n"

          # Keep runner active for RDP connection
          while ($true) {
              Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] ✓ RDP Active - LMHT Ready for Testing"
              Start-Sleep -Seconds 300
          }
