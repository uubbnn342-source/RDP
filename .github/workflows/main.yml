name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop và tắt Network Level Authentication (nếu cần)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Xoá rule firewall nếu tồn tại để tránh trùng tên
          netsh advfirewall firewall delete rule name="RDP-Tailscale"

          # Mở port 3389 cho RDP
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          # Khởi động lại dịch vụ Remote Desktop để cập nhật cấu hình
          Restart-Service -Name TermService -Force
       - name: Install and Configure Graphics Drivers
          run: |
          Write-Host "Installing graphics drivers and OpenGL support..."
          
          # Install DirectX 12
          Write-Host "Installing DirectX 12 runtime..."
          $dxUrl = "https://download.microsoft.com/download/1/7/1/1718CCC4-6315-4D8E-9543-8E28A4E18B5B/dxsetup.exe"
          $dxPath = "$env:TEMP\dxsetup.exe"
          try {
              Invoke-WebRequest -Uri $dxUrl -OutFile $dxPath -TimeoutSec 30
              Start-Process -FilePath $dxPath -ArgumentList "/silent" -Wait
          } catch {
              Write-Host "DirectX installation skipped - may already be present"
          }
          
          # Install NVIDIA CUDA Toolkit
          Write-Host "Attempting to install NVIDIA CUDA support..."
          $cudaUrl = "https://developer.download.nvidia.com/compute/cuda/12.3.0/local_installers/cuda_12.3.0_546.01_windows.exe"
          $cudaPath = "$env:TEMP\cuda_installer.exe"
          try {
              Invoke-WebRequest -Uri $cudaUrl -OutFile $cudaPath -TimeoutSec 60 -ErrorAction SilentlyContinue
              if (Test-Path $cudaPath) {
                  Start-Process -FilePath $cudaPath -ArgumentList "-s" -Wait -ErrorAction SilentlyContinue
              }
          } catch {
              Write-Host "CUDA installation skipped"
          }
          
      - name: Set Virtual GPU Environment Variables
        run: |
          [System.Environment]::SetEnvironmentVariable("GPU_CAPABILITIES", "virtual:memory=1024MB", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("GPU_MEMORY_MB", "1024", [System.EnvironmentVariableTarget]::Machine)
          [System.Environment]::SetEnvironmentVariable("RenderMode", "SoftwareOnly", [System.EnvironmentVariableTarget]::Machine)

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)      # A-Z
              Lower   = [char[]](97..122)     # a-z
              Number  = [char[]](48..57)      # 0-9
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)) # Ký tự đặc biệt
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # Bring up Tailscale with the provided auth key and set a unique hostname
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID

          # Wait for Tailscale to assign an IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          # Test connectivity using Test-NetConnection against the Tailscale IP on port 3389
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"

          # Giữ runner hoạt động
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
